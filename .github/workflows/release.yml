name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra local --extra loopback --extra obs

      - name: Install PyInstaller
        run: uv pip install "pyinstaller==6.14.1"

      - name: Build executable
        run: uv run pyinstaller --noconfirm obs_captions.spec

      - name: Smoke test executable
        run: dist/obs-captions/obs-captions.exe list-devices

      - name: Try native plugin build
        shell: pwsh
        continue-on-error: true
        run: |
          # To enable the full plugin build, set OBS_BUILD_DIR, OBS_STUDIO_DIR,
          # or CMAKE_PREFIX_PATH in this job's environment.
          ./scripts/build_plugin_windows.ps1

      - name: Package Windows release layout
        shell: pwsh
        run: ./scripts/package_windows_release.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-captions-windows-x64
          path: dist/release/obs-captions-windows-x64.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/obs-captions-windows-x64.zip
